experience:
  - role: Researcher
    org: Mexican Institute of Petroleum (IMP)
    start: 2018-01-01
    summary: |
      Research on reservoir simulation, multiphase flow in porous media and artificial
      intelligence applied to the energy sector. Selected projects:

      - Energy transition roadmap (2025–).
      - Geological hydrogen and its prospective potential in Mexico (2025–).
      - AI techniques applied to the simulation of fluid dynamics (2023–2025).
      - AI-based simulator to quantify water coning effects in wells with Venturi
        flow pattern enhancer systems (2023–2025).
      - Thermodynamic characterization of heavy oils by the method of functional groups (2022–2024).
      - Near-wellbore simulation of naturally fractured carbonate reservoirs (2020–2022).
      - Supercomputing applied to the exploration and production of hydrocarbons (2018–2020).

      Supervision of PhD, MSc and internship students, and teaching of Python
      programming and research seminars at the IMP postgraduate program.
  - role: Visiting Professor, Artificial Intelligence Laboratory
    org: Computing Research Center, National Polytechnic Institute (CIC-IPN)
    start: 2021-01-01
    end: 2024-12-31
    summary: |
      Teaching and research in artificial intelligence. Taught Mathematical Methods and
      Linear Programming. Collaborated on the application of AI techniques for the
      optimization of vehicular traffic modeling.
  - role: PhD Researcher & Teaching Assistant
    org: Delft University of Technology (TU Delft)
    start: 2014-09-01
    end: 2018-12-31
    summary: |
      PhD research on POD-based deflation methods for reservoir simulation.
      Teaching assistant for Numerical Mathematics and Differential Equations (EEMCS).
      Secretary of the SIAM Student Chapter (2017).

